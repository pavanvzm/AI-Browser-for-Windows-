<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#09090b"/>
  
  <!-- Main Browser Window Container -->
  <rect x="50" y="50" width="1100" height="700" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  
  <!-- Top Navigation Bar -->
  <rect x="50" y="50" width="1100" height="60" rx="12" fill="#18181b"/>
  <rect x="50" y="98" width="1100" height="1" fill="#27272a"/>
  
  <!-- Window Controls -->
  <circle cx="75" cy="80" r="6" fill="#ef4444"/>
  <circle cx="95" cy="80" r="6" fill="#f59e0b"/>
  <circle cx="115" cy="80" r="6" fill="#10b981"/>
  
  <!-- Nav Buttons (Disabled State) -->
  <path d="M160 80L155 85L160 90" stroke="#3f3f46" stroke-width="2" fill="none"/>
  <path d="M180 80L185 85L180 90" stroke="#3f3f46" stroke-width="2" fill="none"/>
  <circle cx="210" cy="80" r="8" stroke="#3f3f46" stroke-width="2" fill="none"/>
  <path d="M207 80L210 77L213 80L210 83Z" fill="#3f3f46"/>
  
  <!-- Address Bar (Loading State) -->
  <rect x="240" y="68" width="600" height="24" rx="6" fill="#09090b" stroke="#4f46e5" stroke-width="1"/>
  <text x="250" y="84" font-family="Inter, sans-serif" font-size="12" fill="#71717a">https://travel-site.com/flights</text>
  
  <!-- Loading Spinner in Address Bar -->
  <circle cx="820" cy="80" r="10" stroke="#27272a" stroke-width="2" fill="none"/>
  <path d="M820 72A8 8 0 0 1 828 80" stroke="#4f46e5" stroke-width="2" fill="none">
    <animateTransform attributeName="transform" type="rotate" from="0 820 80" to="360 820 80" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <!-- Agent Toggle Button (Active - Pulsing) -->
  <rect x="1040" y="68" width="80" height="24" rx="6" fill="#4f46e5"/>
  <circle cx="1050" cy="80" r="3" fill="#10b981">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="1060" y="84" font-family="Inter, sans-serif" font-size="12" fill="white" font-weight="600">Listening</text>
  
  <!-- Main Content Area (WebView Placeholder) -->
  <rect x="50" y="110" width="850" height="640" fill="#09090b"/>
  
  <!-- Loading Skeleton for Web Content -->
  <rect x="80" y="140" width="200" height="20" rx="4" fill="#27272a">
    <animate attributeName="fill" values="#27272a;#3f3f46;#27272a" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="80" y="180" width="700" height="300" rx="8" fill="#18181b" stroke="#27272a"/>
  <rect x="100" y="200" width="660" height="20" rx="4" fill="#27272a">
    <animate attributeName="fill" values="#27272a;#3f3f46;#27272a" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="100" y="230" width="600" height="20" rx="4" fill="#27272a">
    <animate attributeName="fill" values="#27272a;#3f3f46;#27272a" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="100" y="260" width="640" height="20" rx="4" fill="#27272a">
    <animate attributeName="fill" values="#27272a;#3f3f46;#27272a" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="430" cy="330" r="40" fill="#27272a">
    <animate attributeName="fill" values="#27272a;#3f3f46;#27272a" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Voice Command Overlay (Center Screen) -->
  <rect x="300" y="250" width="400" height="200" rx="16" fill="#18181b" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Glow Effect -->
  <rect x="300" y="250" width="400" height="200" rx="16" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Microphone Icon (Large) -->
  <circle cx="500" cy="310" r="35" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <rect x="490" y="290" width="20" height="30" rx="10" fill="#a5b4fc"/>
  <rect x="485" y="320" width="30" height="8" rx="4" fill="#a5b4fc"/>
  <path d="M500 328L500 345" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round"/>
  <path d="M488 335C488 342 494 348 500 348C506 348 512 342 512 335" stroke="#a5b4fc" stroke-width="3" fill="none"/>
  
  <!-- Sound Waves Animation -->
  <circle cx="500" cy="310" r="45" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6">
    <animate attributeName="r" values="45;55;45" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="310" r="55" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="r" values="55;65;55" dur="1s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="310" r="65" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.2">
    <animate attributeName="r" values="65;75;65" dur="1s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="1s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Voice Command Text -->
  <text x="500" y="370" font-family="Inter, sans-serif" font-size="16" fill="#e4e4e7" font-weight="600" text-anchor="middle">Listening...</text>
  <text x="500" y="395" font-family="Inter, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">"Book a flight to Tokyo"</text>
  <text x="500" y="420" font-family="Inter, sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Speak now or click to cancel</text>
  
  <!-- Cancel Button -->
  <rect x="460" y="435" width="80" height="28" rx="6" fill="#27272a" stroke="#ef4444"/>
  <text x="500" y="454" font-family="Inter, sans-serif" font-size="12" fill="#ef4444" font-weight="600" text-anchor="middle">Cancel</text>
  
  <!-- Agent Sidebar -->
  <rect x="900" y="110" width="250" height="640" fill="#18181b"/>
  <rect x="900" y="110" width="1" height="640" fill="#27272a"/>
  
  <!-- Sidebar Header -->
  <text x="920" y="140" font-family="Inter, sans-serif" font-size="14" fill="#e4e4e7" font-weight="600">AI Assistant</text>
  
  <!-- Chat History -->
  <rect x="920" y="170" width="210" height="35" rx="8" fill="#27272a"/>
  <text x="930" y="192" font-family="Inter, sans-serif" font-size="11" fill="#d4d4d8">Find flights to Tokyo</text>
  
  <rect x="920" y="215" width="210" height="80" rx="8" fill="#312e81"/>
  <rect x="920" y="215" width="4" height="80" rx="2" fill="#6366f1"/>
  <text x="930" y="235" font-family="Inter, sans-serif" font-size="11" fill="#e0e7ff">Searching for best deals...</text>
  <text x="930" y="255" font-family="Inter, sans-serif" font-size="10" fill="#a5b4fc">Checking multiple airlines</text>
  <text x="930" y="275" font-family="Inter, sans-serif" font-size="10" fill="#a5b4fc">Comparing prices & times</text>
  <text x="930" y="290" font-family="Inter, sans-serif" font-size="10" fill="#a5b4fc">~15 seconds remaining</text>
  
  <!-- Task Status (Processing) -->
  <rect x="920" y="310" width="210" height="35" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="930" y="332" font-family="Inter, sans-serif" font-size="11" fill="#93c5fd" font-weight="600">● Processing Voice Command</text>
  
  <!-- Progress Bar -->
  <rect x="920" y="355" width="210" height="8" rx="4" fill="#27272a"/>
  <rect x="920" y="355" width="140" height="8" rx="4" fill="#6366f1">
    <animate attributeName="width" values="0;140;0" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Active Voice Waveform (Animated) -->
  <rect x="920" y="375" width="210" height="70" rx="8" fill="#09090b" stroke="#6366f1" stroke-width="1"/>
  <rect x="930" y="390" width="5" height="40" rx="2.5" fill="#6366f1">
    <animate attributeName="height" values="30;50;25;45;35;40;30" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="940" y="390" width="5" height="35" rx="2.5" fill="#818cf8">
    <animate attributeName="height" values="40;25;45;30;50;35;40" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="950" y="390" width="5" height="45" rx="2.5" fill="#a5b4fc">
    <animate attributeName="height" values="25;50;30;40;35;45;25" dur="0.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="960" y="390" width="5" height="30" rx="2.5" fill="#6366f1">
    <animate attributeName="height" values="45;30;50;25;40;35;45" dur="0.85s" repeatCount="indefinite"/>
  </rect>
  <rect x="970" y="390" width="5" height="50" rx="2.5" fill="#818cf8">
    <animate attributeName="height" values="35;45;25;40;30;50;35" dur="0.75s" repeatCount="indefinite"/>
  </rect>
  <rect x="980" y="390" width="5" height="35" rx="2.5" fill="#a5b4fc">
    <animate attributeName="height" values="40;30;45;35;50;25;40" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="990" y="390" width="5" height="45" rx="2.5" fill="#6366f1">
    <animate attributeName="height" values="30;50;35;40;25;45;30" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="1000" y="390" width="5" height="40" rx="2.5" fill="#818cf8">
    <animate attributeName="height" values="45;25;40;30;50;35;45" dur="0.85s" repeatCount="indefinite"/>
  </rect>
  <rect x="1010" y="390" width="5" height="30" rx="2.5" fill="#a5b4fc">
    <animate attributeName="height" values="35;45;30;50;25;40;35" dur="0.75s" repeatCount="indefinite"/>
  </rect>
  <rect x="1020" y="390" width="5" height="50" rx="2.5" fill="#6366f1">
    <animate attributeName="height" values="40;30;45;35;40;50;40" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="1030" y="390" width="5" height="35" rx="2.5" fill="#818cf8">
    <animate attributeName="height" values="30;50;25;45;35;40;30" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="1040" y="390" width="5" height="45" rx="2.5" fill="#a5b4fc">
    <animate attributeName="height" values="45;35;40;30;50;25;45" dur="0.85s" repeatCount="indefinite"/>
  </rect>
  <rect x="1050" y="390" width="5" height="40" rx="2.5" fill="#6366f1">
    <animate attributeName="height" values="25;45;35;50;30;40;25" dur="0.75s" repeatCount="indefinite"/>
  </rect>
  <rect x="1060" y="390" width="5" height="30" rx="2.5" fill="#818cf8">
    <animate attributeName="height" values="50;30;45;35;40;25;50" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="1070" y="390" width="5" height="50" rx="2.5" fill="#a5b4fc">
    <animate attributeName="height" values="35;45;30;40;50;35;35" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="1080" y="390" width="5" height="35" rx="2.5" fill="#6366f1">
    <animate attributeName="height" values="40;30;50;25;45;40;40" dur="0.85s" repeatCount="indefinite"/>
  </rect>
  <rect x="1090" y="390" width="5" height="45" rx="2.5" fill="#818cf8">
    <animate attributeName="height" values="30;50;35;40;25;45;30" dur="0.75s" repeatCount="indefinite"/>
  </rect>
  <rect x="1100" y="390" width="5" height="40" rx="2.5" fill="#a5b4fc">
    <animate attributeName="height" values="45;35;40;30;50;35;45" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="1110" y="390" width="5" height="30" rx="2.5" fill="#6366f1">
    <animate attributeName="height" values="35;45;30;50;40;25;35" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Input Area (Disabled) -->
  <rect x="920" y="460" width="210" height="40" rx="8" fill="#09090b" stroke="#27272a" opacity="0.5"/>
  <text x="930" y="485" font-family="Inter, sans-serif" font-size="12" fill="#3f3f46">Voice command in progress...</text>
  
  <!-- Wake Word Badge (Active) -->
  <rect x="920" y="515" width="210" height="30" rx="15" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="935" y="535" font-family="Inter, sans-serif" font-size="11" fill="#a5b4fc" font-weight="600">🎤 Voice Active</text>
  
  <!-- Info Panel -->
  <rect x="920" y="560" width="210" height="80" rx="8" fill="#09090b" stroke="#27272a"/>
  <text x="930" y="580" font-family="Inter, sans-serif" font-size="11" fill="#71717a" font-weight="600">Voice Control Tips:</text>
  <text x="930" y="600" font-family="Inter, sans-serif" font-size="10" fill="#a1a1aa">• Say "Hey Agent" to wake</text>
  <text x="930" y="615" font-family="Inter, sans-serif" font-size="10" fill="#a1a1aa">• Speak clearly and naturally</text>
  <text x="930" y="630" font-family="Inter, sans-serif" font-size="10" fill="#a1a1aa">• Say "Cancel" to stop</text>
  
  <!-- Footer -->
  <text x="600" y="780" font-family="Inter, sans-serif" font-size="12" fill="#52525b" text-anchor="middle">Voice-First Browsing • AI-Powered Automation • Dark Mode Only</text>
</svg>
